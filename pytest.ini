[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    # `_aget` coroutine never awaited : provient de discord.utils.get/find appele
    # par discord.py sur des mocks iterables (non-async). Inoffensif en test
    # (les mocks Discord ne dispatchent pas la coroutine), mais pollue le report.
    ignore:coroutine '_aget' was never awaited:RuntimeWarning
    ignore::pytest.PytestUnraisableExceptionWarning
markers =
    unit: tests unitaires (logique pure, sans I/O)
    integration: tests d'integration (avec fakes Discord/Mongo)
